<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lawn Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background-color: #ffffff;
      background-color: var(--homey-color-background, #ffffff);
      color: #1a1a1a;
      color: var(--homey-color-text, #1a1a1a);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      overflow: hidden;
    }

    .widget {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 14px;
      height: 100%;
    }

    /* Loading / error */
    #msg {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85em;
      color: #888;
      text-align: center;
      padding: 8px;
    }
    #msg.err {
      color: #856404;
      background: #fff3cd;
      border-radius: 8px;
      font-size: 0.8em;
    }

    /* Top row */
    .top { display: flex; align-items: center; gap: 12px; }

    .ring-wrap { position: relative; width: 58px; height: 58px; flex-shrink: 0; }
    .ring-wrap svg { transform: rotate(-90deg); display: block; }
    .bg  { fill: none; stroke: #e0e0e0; stroke-width: 6; }
    .val { fill: none; stroke: #4caf50; stroke-width: 6; stroke-linecap: round;
           transition: stroke-dashoffset .5s ease; }
    .val.amber { stroke: #ff9800; }
    .val.red   { stroke: #f44336; }
    .lbl {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.05em; font-weight: 800;
    }

    .info { flex: 1; min-width: 0; }
    .dname { font-size: 0.7em; color: #888; color: var(--homey-color-text-light, #888);
             white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
    .status { font-size: 0.92em; font-weight: 700;
              white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .rec    { font-size: 0.76em; color: #666; color: var(--homey-color-text-light, #666);
              margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    hr { border: none; border-top: 1px solid #e0e0e0;
         border-color: var(--homey-color-border, #e0e0e0); }

    /* Action row */
    .actions { display: flex; gap: 8px; }
    .ac { flex: 1; min-width: 0; }
    .al { font-size: 0.62em; font-weight: 700; text-transform: uppercase;
          letter-spacing: .05em; color: #999; color: var(--homey-color-text-light, #999);
          margin-bottom: 2px; }
    .av { font-size: 0.82em; font-weight: 600;
          white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* Badges */
    .badges { display: flex; flex-wrap: wrap; gap: 4px; }
    .badge  { display: inline-block; padding: 2px 7px; border-radius: 20px;
               font-size: 0.68em; font-weight: 700; background: #f0f0f0; color: #555; }
    .badge.g { background: #e8f5e9; color: #2e7d32; }
    .badge.a { background: #fff3e0; color: #e65100; }
    .badge.r { background: #ffebee; color: #b71c1c; }

    .hidden { display: none !important; }
  </style>
</head>
<body>
<div class="widget">
  <div id="msg">Loading…</div>

  <div class="top hidden" id="top">
    <div class="ring-wrap">
      <svg viewBox="0 0 58 58" width="58" height="58">
        <circle class="bg"  cx="29" cy="29" r="22" />
        <circle class="val" cx="29" cy="29" r="22" id="ring"
                stroke-dasharray="138.2" stroke-dashoffset="138.2" />
      </svg>
      <div class="lbl" id="score">—</div>
    </div>
    <div class="info">
      <div class="dname"  id="dname"></div>
      <div class="status" id="status">—</div>
      <div class="rec"    id="rec">—</div>
    </div>
  </div>

  <hr class="hidden" id="hr1" />

  <div class="actions hidden" id="actions">
    <div class="ac"><div class="al">Next action</div><div class="av" id="action">—</div></div>
    <div class="ac"><div class="al">Date</div>        <div class="av" id="date">—</div></div>
    <div class="ac"><div class="al">Deficit</div>     <div class="av" id="deficit">—</div></div>
  </div>

  <hr class="hidden" id="hr2" />

  <div class="badges hidden" id="badges"></div>
</div>

<script>
  var CIRC = 2 * Math.PI * 22; // 138.2

  function show(id) { document.getElementById(id).classList.remove('hidden'); }

  function setMsg(text, isError) {
    var el = document.getElementById('msg');
    el.textContent = text;
    el.className = isError ? 'err' : '';
    el.classList.remove('hidden');
  }

  function badge(text, cls) {
    var el = document.createElement('span');
    el.className = 'badge ' + (cls || '');
    el.textContent = text;
    return el;
  }

  function statusCls(s) {
    if (!s) return 'g';
    var l = s.toLowerCase();
    if (l.indexOf('frost') >= 0 || l.indexOf('heat') >= 0) return 'r';
    if (l.indexOf('water') >= 0 || l.indexOf('fertiliser') >= 0 || l.indexOf('recovery') >= 0) return 'a';
    return 'g';
  }

  function render(d) {
    if (!d || d.error) {
      setMsg(d && d.error ? d.error : 'No data — pair a device first.', true);
      return;
    }

    document.getElementById('msg').classList.add('hidden');

    var sc = d['lawn_overall_score'];
    var pct = sc != null ? Math.max(0, Math.min(100, sc)) / 100 : 0;
    var ring = document.getElementById('ring');
    ring.style.strokeDashoffset = String(CIRC * (1 - pct));
    ring.className = 'val' + (sc == null || sc >= 60 ? '' : sc >= 35 ? ' amber' : ' red');
    document.getElementById('score').textContent  = sc != null ? String(sc) : '—';
    document.getElementById('dname').textContent  = d.deviceName || '';
    document.getElementById('status').textContent = d['lawn_status'] || '—';
    document.getElementById('rec').textContent    = d['primary_recommendation'] || '—';
    document.getElementById('action').textContent = d['next_action'] || '—';
    document.getElementById('date').textContent   = d['next_action_date'] || '—';
    var def = d['water_deficit_mm'];
    document.getElementById('deficit').textContent = def > 0 ? def + ' mm' : '✓ Met';

    var row = document.getElementById('badges');
    row.innerHTML = '';
    row.appendChild(badge(d['lawn_status'] || 'Unknown', statusCls(d['lawn_status'])));
    var frost = d['frost_severity'];
    if (frost && frost !== 'none') row.appendChild(badge('Frost: ' + frost, 'r'));
    var heat = d['heat_stress_severity'];
    if (heat && heat !== 'none') row.appendChild(badge('Heat: ' + heat, 'r'));
    if (d['lawn_recovery_mode']) row.appendChild(badge('Recovery', 'a'));
    var fd = d['fertiliser_days_remaining'];
    if (fd != null && fd <= 0) row.appendChild(badge('Fertiliser due', 'a'));

    show('top'); show('hr1'); show('actions'); show('hr2'); show('badges');
  }

  function onHomeyReady(Homey) {
    Homey.ready({ height: 220 });
    Homey.api('GET', '/', {})
      .then(function(data) { render(data); })
      .catch(function(err) { setMsg('Error: ' + (err.message || err), true); });
  }
</script>
</body>
</html>
