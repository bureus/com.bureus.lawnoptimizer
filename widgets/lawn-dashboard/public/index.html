<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lawn Dashboard</title>
  <style>
    /* ── Design tokens (inlined from widgets/shared/theme.css) ── */
    :root {
      --bg:      var(--homey-color-background,       #f5f5f3);
      --chip:    var(--homey-color-background-light, #eaeae8);
      --text:    var(--homey-color-text,       #1a1a1a);
      --text-2:  var(--homey-color-text-light, #6b7280);
      --text-3:  var(--homey-color-text-light, #9ca3af);
      --border:  var(--homey-color-border, rgba(0,0,0,0.09));
      --ring-track: rgba(0,0,0,0.08);
      --ok:      #4caf50; --ok-bg:   #e8f5e9; --ok-txt:   #2e7d32;
      --warn:    #ff9800; --warn-bg: #fff3e0; --warn-txt: #e65100;
      --err:     #f44336; --err-bg:  #ffebee; --err-txt:  #b71c1c;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:      var(--homey-color-background,       #18181b);
        --chip:    var(--homey-color-background-light, #2e2e33);
        --text:    var(--homey-color-text,       #f4f4f5);
        --text-2:  var(--homey-color-text-light, #a1a1aa);
        --text-3:  var(--homey-color-text-light, #71717a);
        --border:  var(--homey-color-border, rgba(255,255,255,0.09));
        --ring-track: rgba(255,255,255,0.08);
        --ok-bg:   rgba(76,175,80,0.18);   --ok-txt:   #86efac;
        --warn-bg: rgba(255,152,0,0.18);   --warn-txt: #fbbf24;
        --err-bg:  rgba(244,67,54,0.18);   --err-txt:  #f87171;
      }
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background-color: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      overflow: hidden;
    }

    .widget {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 14px;
      height: 100%;
    }

    /* ── Loading / error ── */
    #msg {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85em;
      color: var(--text-3);
      text-align: center;
      padding: 8px;
    }
    #msg.err {
      color: var(--warn-txt);
      background: var(--warn-bg);
      border-radius: 8px;
      font-size: 0.8em;
    }

    /* ── Top row ── */
    .top { display: flex; align-items: center; gap: 12px; }

    .ring-wrap { position: relative; width: 58px; height: 58px; flex-shrink: 0; }
    .ring-wrap svg { transform: rotate(-90deg); display: block; }
    .ring-bg  { fill: none; stroke: var(--ring-track); stroke-width: 6; }
    .ring-val { fill: none; stroke: var(--ok); stroke-width: 6; stroke-linecap: round;
                transition: stroke-dashoffset .5s ease; }
    .ring-val.amber { stroke: var(--warn); }
    .ring-val.red   { stroke: var(--err); }
    .ring-lbl {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.05em; font-weight: 800;
    }

    .info { flex: 1; min-width: 0; }
    .dname  { font-size: 0.7em; color: var(--text-3);
              white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
    .status { font-size: 0.92em; font-weight: 700;
              white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .rec    { font-size: 0.76em; color: var(--text-2);
              margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    hr { border: none; border-top: 1px solid var(--border); }

    /* ── Action row — 4 columns, first 2× wide ── */
    .actions { display: flex; gap: 6px; }
    .ac { flex: 1; min-width: 0; }
    .ac:first-child { flex: 2; }
    .al { font-size: 0.6em; font-weight: 700; text-transform: uppercase;
          letter-spacing: .05em; color: var(--text-3); margin-bottom: 2px; }
    .av { font-size: 0.8em; font-weight: 600;
          white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* ── Status badges ── */
    .badges { display: flex; flex-wrap: wrap; gap: 4px; }
    .badge  {
      display: inline-block; padding: 2px 7px; border-radius: 20px;
      font-size: 0.68em; font-weight: 700;
      background: var(--chip); color: var(--text-2);
    }
    .badge.g { background: var(--ok-bg);   color: var(--ok-txt);   }
    .badge.a { background: var(--warn-bg); color: var(--warn-txt); }
    .badge.r { background: var(--err-bg);  color: var(--err-txt);  }

    .hidden { display: none !important; }
  </style>
</head>
<body>
<div class="widget">
  <div id="msg">Loading…</div>

  <div class="top hidden" id="top">
    <div class="ring-wrap">
      <svg viewBox="0 0 58 58" width="58" height="58">
        <circle class="ring-bg"  cx="29" cy="29" r="22" />
        <circle class="ring-val" cx="29" cy="29" r="22" id="ring"
                stroke-dasharray="138.2" stroke-dashoffset="138.2" />
      </svg>
      <div class="ring-lbl" id="score">—</div>
    </div>
    <div class="info">
      <div class="dname"  id="dname"></div>
      <div class="status" id="status">—</div>
      <div class="rec"    id="rec">—</div>
    </div>
  </div>

  <hr class="hidden" id="hr1" />

  <div class="actions hidden" id="actions">
    <div class="ac"><div class="al" id="lbl-action"></div><div class="av" id="action">—</div></div>
    <div class="ac"><div class="al" id="lbl-date"></div>  <div class="av" id="date">—</div></div>
    <div class="ac"><div class="al" id="lbl-deficit"></div><div class="av" id="deficit">—</div></div>
    <div class="ac"><div class="al" id="lbl-health"></div><div class="av" id="health">—</div></div>
  </div>

  <hr class="hidden" id="hr2" />

  <div class="badges hidden" id="badges"></div>
</div>

<script>
  var I18N = {
    en: {
      loading: 'Loading…',
      nextAction: 'Next action', date: 'Date', deficit: 'Deficit', healthScore: 'Health score',
      met: '✓ Met', unknown: 'Unknown',
      frost: 'Frost: ', heat: 'Heat: ', recovery: 'Recovery', fertiliserDue: 'Fertiliser due',
      noData: 'No data — pair a device first.', error: 'Error: ',
    },
    de: {
      loading: 'Wird geladen…',
      nextAction: 'Nächste Maßnahme', date: 'Datum', deficit: 'Defizit', healthScore: 'Gesundheitswert',
      met: '✓ Erreicht', unknown: 'Unbekannt',
      frost: 'Frost: ', heat: 'Hitze: ', recovery: 'Erholung', fertiliserDue: 'Düngung fällig',
      noData: 'Keine Daten — zuerst ein Gerät koppeln.', error: 'Fehler: ',
    },
    nl: {
      loading: 'Laden…',
      nextAction: 'Volgende actie', date: 'Datum', deficit: 'Tekort', healthScore: 'Gezondheidsscore',
      met: '✓ Bereikt', unknown: 'Onbekend',
      frost: 'Vorst: ', heat: 'Hitte: ', recovery: 'Herstel', fertiliserDue: 'Bemesting gereed',
      noData: 'Geen data — koppel eerst een apparaat.', error: 'Fout: ',
    },
    fr: {
      loading: 'Chargement…',
      nextAction: 'Prochaine action', date: 'Date', deficit: 'Déficit', healthScore: 'Score de santé',
      met: '✓ Atteint', unknown: 'Inconnu',
      frost: 'Gel : ', heat: 'Chaleur : ', recovery: 'Récupération', fertiliserDue: 'Fertilisation due',
      noData: 'Aucune donnée — coupler un appareil d\'abord.', error: 'Erreur : ',
    },
    es: {
      loading: 'Cargando…',
      nextAction: 'Próxima acción', date: 'Fecha', deficit: 'Déficit', healthScore: 'Puntuación de salud',
      met: '✓ Cumplido', unknown: 'Desconocido',
      frost: 'Helada: ', heat: 'Calor: ', recovery: 'Recuperación', fertiliserDue: 'Fertilización pendiente',
      noData: 'Sin datos — empareja un dispositivo primero.', error: 'Error: ',
    },
    it: {
      loading: 'Caricamento…',
      nextAction: 'Prossima azione', date: 'Data', deficit: 'Deficit', healthScore: 'Punteggio salute',
      met: '✓ Raggiunto', unknown: 'Sconosciuto',
      frost: 'Gelo: ', heat: 'Caldo: ', recovery: 'Recupero', fertiliserDue: 'Fertilizzazione dovuta',
      noData: 'Nessun dato — collegare prima un dispositivo.', error: 'Errore: ',
    },
    sv: {
      loading: 'Laddar…',
      nextAction: 'Nästa åtgärd', date: 'Datum', deficit: 'Underskott', healthScore: 'Hälsopoäng',
      met: '✓ Uppnått', unknown: 'Okänt',
      frost: 'Frost: ', heat: 'Värme: ', recovery: 'Återhämtning', fertiliserDue: 'Gödsling aktuell',
      noData: 'Inga data — para ihop en enhet först.', error: 'Fel: ',
    },
    no: {
      loading: 'Laster…',
      nextAction: 'Neste tiltak', date: 'Dato', deficit: 'Underskudd', healthScore: 'Helsepoeng',
      met: '✓ Oppnådd', unknown: 'Ukjent',
      frost: 'Frost: ', heat: 'Varme: ', recovery: 'Restitusjon', fertiliserDue: 'Gjødsling forfalt',
      noData: 'Ingen data — koble til en enhet først.', error: 'Feil: ',
    },
    da: {
      loading: 'Indlæser…',
      nextAction: 'Næste handling', date: 'Dato', deficit: 'Underskud', healthScore: 'Sundhedsscore',
      met: '✓ Opnået', unknown: 'Ukendt',
      frost: 'Frost: ', heat: 'Varme: ', recovery: 'Restitution', fertiliserDue: 'Gødning forfaldet',
      noData: 'Ingen data — tilslut en enhed først.', error: 'Fejl: ',
    },
    pl: {
      loading: 'Wczytywanie…',
      nextAction: 'Następna czynność', date: 'Data', deficit: 'Niedobór', healthScore: 'Wynik zdrowia',
      met: '✓ Osiągnięto', unknown: 'Nieznany',
      frost: 'Mróz: ', heat: 'Upał: ', recovery: 'Regeneracja', fertiliserDue: 'Nawożenie wymagane',
      noData: 'Brak danych — najpierw połącz urządzenie.', error: 'Błąd: ',
    },
    ru: {
      loading: 'Загрузка…',
      nextAction: 'Следующее действие', date: 'Дата', deficit: 'Дефицит', healthScore: 'Оценка здоровья',
      met: '✓ Выполнено', unknown: 'Неизвестно',
      frost: 'Мороз: ', heat: 'Жара: ', recovery: 'Восстановление', fertiliserDue: 'Удобрение ожидается',
      noData: 'Нет данных — сначала сопрягите устройство.', error: 'Ошибка: ',
    },
    ko: {
      loading: '로딩 중…',
      nextAction: '다음 작업', date: '날짜', deficit: '부족량', healthScore: '건강 점수',
      met: '✓ 충족', unknown: '알 수 없음',
      frost: '서리: ', heat: '열기: ', recovery: '회복', fertiliserDue: '비료 필요',
      noData: '데이터 없음 — 먼저 기기를 연결하세요.', error: '오류: ',
    },
  };

  var CIRC = 2 * Math.PI * 22; // 138.2

  function getLang() {
    var l = (navigator.language || '').toLowerCase();
    var code = l.slice(0, 2);
    if (code === 'nb' || code === 'nn') return 'no';
    return I18N[code] ? code : 'en';
  }

  var t = I18N[getLang()] || I18N.en;

  function show(id) { document.getElementById(id).classList.remove('hidden'); }

  function setMsg(text, isError) {
    var el = document.getElementById('msg');
    el.textContent = text;
    el.className = isError ? 'err' : '';
    el.classList.remove('hidden');
  }

  function badge(text, cls) {
    var el = document.createElement('span');
    el.className = 'badge ' + (cls || '');
    el.textContent = text;
    return el;
  }

  function statusCls(s) {
    if (!s) return 'g';
    var l = s.toLowerCase();
    if (l.indexOf('frost') >= 0 || l.indexOf('heat') >= 0) return 'r';
    if (l.indexOf('water') >= 0 || l.indexOf('fertiliser') >= 0 || l.indexOf('recovery') >= 0) return 'a';
    return 'g';
  }

  function initLabels() {
    document.getElementById('lbl-action').textContent  = t.nextAction;
    document.getElementById('lbl-date').textContent    = t.date;
    document.getElementById('lbl-deficit').textContent = t.deficit;
    document.getElementById('lbl-health').textContent  = t.healthScore;
  }

  function render(d) {
    if (!d || d.error) {
      setMsg(d && d.error ? d.error : t.noData, true);
      return;
    }

    document.getElementById('msg').classList.add('hidden');

    // Ring shows raw growth score — the model's direct output.
    var sc = d['lawn_growth_score'];
    var pct = sc != null ? Math.max(0, Math.min(100, sc)) / 100 : 0;
    var ring = document.getElementById('ring');
    ring.style.strokeDashoffset = String(CIRC * (1 - pct));
    ring.className = 'ring-val' + (sc == null || sc >= 60 ? '' : sc >= 35 ? ' amber' : ' red');
    document.getElementById('score').textContent  = sc != null ? String(sc) : '—';
    document.getElementById('dname').textContent  = d.deviceName || '';
    document.getElementById('status').textContent = d['lawn_status'] || '—';
    document.getElementById('rec').textContent    = d['primary_recommendation'] || '—';
    document.getElementById('action').textContent = d['next_action'] || '—';
    document.getElementById('date').textContent   = d['next_action_date'] || '—';
    var def = d['water_deficit_mm'];
    document.getElementById('deficit').textContent = def > 0 ? def + ' mm' : t.met;
    var hs = d['lawn_overall_score'];
    document.getElementById('health').textContent = hs != null ? hs + ' pts' : '—';

    var row = document.getElementById('badges');
    row.innerHTML = '';
    row.appendChild(badge(d['lawn_status'] || t.unknown, statusCls(d['lawn_status'])));
    var frost = d['frost_severity'];
    if (frost && frost !== 'none') row.appendChild(badge(t.frost + frost, 'r'));
    var heat = d['heat_stress_severity'];
    if (heat && heat !== 'none') row.appendChild(badge(t.heat + heat, 'r'));
    if (d['lawn_recovery_mode']) row.appendChild(badge(t.recovery, 'a'));
    var fd = d['fertiliser_days_remaining'];
    if (fd != null && fd <= 0) row.appendChild(badge(t.fertiliserDue, 'a'));

    show('top'); show('hr1'); show('actions'); show('hr2'); show('badges');
  }

  function onHomeyReady(Homey) {
    document.getElementById('msg').textContent = t.loading;
    initLabels();
    Homey.ready({ height: 230 });
    Homey.api('GET', '/', {})
      .then(function(data) { render(data); })
      .catch(function(err) { setMsg(t.error + (err.message || err), true); });
  }
</script>
</body>
</html>
