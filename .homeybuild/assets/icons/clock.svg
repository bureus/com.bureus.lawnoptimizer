<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Clock face -->
  <circle cx="50" cy="50" r="38" fill="none" stroke="#78909C" stroke-width="6"/>
  <!-- Tick marks at 12/3/6/9 -->
  <line x1="50" y1="15" x2="50" y2="22" stroke="#78909C" stroke-width="4" stroke-linecap="round"/>
  <line x1="85" y1="50" x2="78" y2="50" stroke="#78909C" stroke-width="4" stroke-linecap="round"/>
  <line x1="50" y1="85" x2="50" y2="78" stroke="#78909C" stroke-width="4" stroke-linecap="round"/>
  <line x1="15" y1="50" x2="22" y2="50" stroke="#78909C" stroke-width="4" stroke-linecap="round"/>
  <!-- Hour hand pointing ~10 o'clock (upper-left) -->
  <line x1="50" y1="50" x2="31" y2="31" stroke="#37474F" stroke-width="6" stroke-linecap="round"/>
  <!-- Minute hand pointing ~2 o'clock (upper-right) -->
  <line x1="50" y1="50" x2="67" y2="24" stroke="#37474F" stroke-width="4" stroke-linecap="round"/>
  <!-- Center pivot -->
  <circle cx="50" cy="50" r="5" fill="#607D8B"/>
</svg>
