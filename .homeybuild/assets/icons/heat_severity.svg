<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Thermometer tube -->
  <rect x="44" y="12" width="12" height="52" rx="6" fill="none" stroke="#FF7043" stroke-width="5"/>
  <!-- Thermometer bulb -->
  <circle cx="50" cy="72" r="12" fill="none" stroke="#FF7043" stroke-width="5"/>
  <!-- Mercury fill inside (red — hot) -->
  <rect x="47" y="28" width="6" height="44" fill="#FFAB76"/>
  <circle cx="50" cy="72" r="8" fill="#FF7043"/>
  <!-- Heat rays radiating around the bulb -->
  <line x1="30" y1="72" x2="20" y2="72" stroke="#F9A825" stroke-width="4" stroke-linecap="round"/>
  <line x1="70" y1="72" x2="80" y2="72" stroke="#F9A825" stroke-width="4" stroke-linecap="round"/>
  <line x1="34" y1="58" x2="26" y2="50" stroke="#F9A825" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="66" y1="58" x2="74" y2="50" stroke="#F9A825" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="34" y1="86" x2="26" y2="94" stroke="#F9A825" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="66" y1="86" x2="74" y2="94" stroke="#F9A825" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="50" y1="88" x2="50" y2="98" stroke="#FDD835" stroke-width="3.5" stroke-linecap="round"/>
</svg>
