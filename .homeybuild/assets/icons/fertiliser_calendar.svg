<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Calendar body -->
  <rect x="12" y="24" width="76" height="64" rx="8" fill="none" stroke="#FF9800" stroke-width="5"/>
  <!-- Orange header bar -->
  <rect x="12" y="24" width="76" height="20" rx="8" fill="#FF9800"/>
  <rect x="12" y="36" width="76" height="8" fill="#FF9800"/>
  <!-- Binding rings -->
  <rect x="30" y="14" width="7" height="18" rx="3.5" fill="#E65100"/>
  <rect x="63" y="14" width="7" height="18" rx="3.5" fill="#E65100"/>
  <!-- Date dots: 2x4 grid -->
  <circle cx="28" cy="58" r="4" fill="#90A4AE"/>
  <circle cx="40" cy="58" r="4" fill="#90A4AE"/>
  <circle cx="52" cy="58" r="4" fill="#90A4AE"/>
  <circle cx="64" cy="58" r="4" fill="#90A4AE"/>
  <circle cx="28" cy="72" r="4" fill="#90A4AE"/>
  <circle cx="40" cy="72" r="4" fill="#90A4AE"/>
  <circle cx="52" cy="72" r="4" fill="#90A4AE"/>
  <!-- Highlighted fertiliser granule dot: orange filled circle with white highlight -->
  <circle cx="64" cy="72" r="6" fill="#FF9800"/>
  <circle cx="61" cy="69" r="2" fill="white" opacity="0.7"/>
</svg>
