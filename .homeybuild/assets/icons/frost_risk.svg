<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Vertical arm -->
  <line x1="50" y1="8" x2="50" y2="92" stroke="#5B9BD5" stroke-width="7" stroke-linecap="round"/>
  <!-- Horizontal arm -->
  <line x1="8" y1="50" x2="92" y2="50" stroke="#5B9BD5" stroke-width="7" stroke-linecap="round"/>
  <!-- Diagonal arms -->
  <line x1="17" y1="17" x2="83" y2="83" stroke="#5B9BD5" stroke-width="7" stroke-linecap="round"/>
  <line x1="83" y1="17" x2="17" y2="83" stroke="#5B9BD5" stroke-width="7" stroke-linecap="round"/>
  <!-- Branches: top -->
  <line x1="50" y1="27" x2="38" y2="15" stroke="#5B9BD5" stroke-width="5" stroke-linecap="round"/>
  <line x1="50" y1="27" x2="62" y2="15" stroke="#5B9BD5" stroke-width="5" stroke-linecap="round"/>
  <!-- Branches: bottom -->
  <line x1="50" y1="73" x2="38" y2="85" stroke="#5B9BD5" stroke-width="5" stroke-linecap="round"/>
  <line x1="50" y1="73" x2="62" y2="85" stroke="#5B9BD5" stroke-width="5" stroke-linecap="round"/>
  <!-- Branches: left -->
  <line x1="27" y1="50" x2="15" y2="38" stroke="#5B9BD5" stroke-width="5" stroke-linecap="round"/>
  <line x1="27" y1="50" x2="15" y2="62" stroke="#5B9BD5" stroke-width="5" stroke-linecap="round"/>
  <!-- Branches: right -->
  <line x1="73" y1="50" x2="85" y2="38" stroke="#5B9BD5" stroke-width="5" stroke-linecap="round"/>
  <line x1="73" y1="50" x2="85" y2="62" stroke="#5B9BD5" stroke-width="5" stroke-linecap="round"/>
  <!-- Center -->
  <circle cx="50" cy="50" r="9" fill="#5B9BD5"/>
  <circle cx="50" cy="50" r="5" fill="#fff"/>
</svg>
