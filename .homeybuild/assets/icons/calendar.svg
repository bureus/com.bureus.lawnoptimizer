<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Calendar body -->
  <rect x="12" y="24" width="76" height="64" rx="8" fill="none" stroke="#4CAF50" stroke-width="5"/>
  <!-- Green header bar -->
  <rect x="12" y="24" width="76" height="20" rx="8" fill="#4CAF50"/>
  <rect x="12" y="36" width="76" height="8" fill="#4CAF50"/>
  <!-- Binding rings -->
  <rect x="30" y="14" width="7" height="18" rx="3.5" fill="#2E7D32"/>
  <rect x="63" y="14" width="7" height="18" rx="3.5" fill="#2E7D32"/>
  <!-- Date dots: 2x4 grid -->
  <circle cx="28" cy="58" r="4" fill="#90A4AE"/>
  <circle cx="40" cy="58" r="4" fill="#90A4AE"/>
  <circle cx="52" cy="58" r="4" fill="#90A4AE"/>
  <circle cx="64" cy="58" r="4" fill="#90A4AE"/>
  <circle cx="28" cy="72" r="4" fill="#90A4AE"/>
  <circle cx="40" cy="72" r="4" fill="#90A4AE"/>
  <circle cx="52" cy="72" r="4" fill="#90A4AE"/>
  <!-- Highlighted green dot -->
  <circle cx="64" cy="72" r="5" fill="#4CAF50"/>
</svg>
