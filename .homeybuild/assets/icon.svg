<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="Smart lawn optimization icon">
  <defs>
    <linearGradient id="bg" x1="160" y1="110" x2="860" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7CFF52"/>
      <stop offset=".42" stop-color="#069276"/>
      <stop offset="1" stop-color="#051C55"/>
    </linearGradient>

    <radialGradient id="softLight" cx="36%" cy="24%" r="72%">
      <stop offset="0" stop-color="#B9FF7A" stop-opacity=".42"/>
      <stop offset=".42" stop-color="#23E0B0" stop-opacity=".14"/>
      <stop offset="1" stop-color="#00133A" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="blade" x1="370" y1="295" x2="650" y2="690">
      <stop offset="0" stop-color="#E5FF6D"/>
      <stop offset=".55" stop-color="#67E84F"/>
      <stop offset="1" stop-color="#12A85E"/>
    </linearGradient>

    <linearGradient id="soil" x1="250" y1="708" x2="780" y2="708">
      <stop offset="0" stop-color="#FFB13B"/>
      <stop offset=".48" stop-color="#B7FF61"/>
      <stop offset="1" stop-color="#20E7FF"/>
    </linearGradient>

    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="28" stdDeviation="28" flood-color="#001733" flood-opacity=".38"/>
    </filter>

    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="round">
      <rect x="64" y="64" width="896" height="896" rx="224"/>
    </clipPath>
  </defs>

  <rect x="64" y="64" width="896" height="896" rx="224" fill="url(#bg)"/>
  <g clip-path="url(#round)">
    <rect x="64" y="64" width="896" height="896" rx="224" fill="url(#softLight)"/>
    <circle cx="780" cy="250" r="230" fill="#0E7BFF" opacity=".08"/>
  </g>

  <g filter="url(#shadow)">
    <path d="M246 662c102-58 430-58 532 0" fill="none" stroke="#D9FF71" stroke-width="24" stroke-linecap="round" opacity=".95"/>

    <g fill="url(#blade)">
      <path d="M515 655C488 512 516 388 615 286c-19 145-39 281-100 369z"/>
      <path d="M452 655C413 529 360 432 270 374c94 22 182 137 182 281z"/>
      <path d="M579 655c43-123 120-210 238-247-92 78-153 165-238 247z"/>
      <path d="M394 655c-52-78-104-122-186-145 74 62 117 108 186 145z"/>
      <path d="M646 655c64-67 119-96 196-108-68 50-119 83-196 108z"/>
    </g>

    <path d="M252 724c78-69 150 68 232 0 74-62 135 62 216 0 42-32 82-39 128-16"
          fill="none" stroke="url(#soil)" stroke-width="28" stroke-linecap="round" filter="url(#glow)"/>

    <path d="M252 724c78-69 150 68 232 0 74-62 135 62 216 0 42-32 82-39 128-16"
          fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" opacity=".42"/>
  </g>

  <g fill="none" stroke-linecap="round">
    <path d="M266 548a278 278 0 0 1 492 0" stroke="#5FFFF0" stroke-width="13" opacity=".52"/>
    <path d="M316 536a220 220 0 0 1 146-143" stroke="#D6FF74" stroke-width="9" opacity=".42"/>
  </g>

  <g filter="url(#glow)">
    <circle cx="512" cy="312" r="34" fill="#0BCB9A"/>
    <circle cx="512" cy="312" r="22" fill="#F4FFF5"/>
    <circle cx="778" cy="533" r="24" fill="#84FF70"/>
    <circle cx="778" cy="533" r="9" fill="#F5FFF3"/>
  </g>

  <path d="M180 118h472" stroke="#fff" stroke-width="3" opacity=".18" stroke-linecap="round"/>
  <path d="M132 740c170 95 550 120 780 0" stroke="#fff" stroke-width="2" opacity=".08" fill="none"/>
</svg>
