<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Rounded-square clip (iOS app icon shape) -->
    <clipPath id="appShape">
      <rect width="100" height="100" rx="22" ry="22"/>
    </clipPath>

    <!-- Gauge face gradient (frosted-glass look) -->
    <radialGradient id="gaugeGrad" cx="38%" cy="32%" r="68%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#dce6f0"/>
    </radialGradient>

    <!-- Sandy soil gradient -->
    <linearGradient id="sandGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#c89238"/>
      <stop offset="100%" stop-color="#b07a22"/>
    </linearGradient>

    <!-- Clay layer gradient -->
    <linearGradient id="clayGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#7b4c26"/>
      <stop offset="100%" stop-color="#5e3518"/>
    </linearGradient>

    <!-- Topsoil gradient -->
    <linearGradient id="darkGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#3a1e0c"/>
      <stop offset="100%" stop-color="#271208"/>
    </linearGradient>
  </defs>

  <!-- ── BACKGROUND ── -->
  <rect width="100" height="100" rx="22" ry="22" fill="#eef2ec"/>

  <!-- ── SOIL LAYERS (clipped to app shape) ── -->
  <g clip-path="url(#appShape)">
    <!-- Sandy bottom layer -->
    <ellipse cx="50" cy="93" rx="52" ry="24" fill="url(#sandGrad)"/>
    <!-- Pebbles in sandy layer -->
    <ellipse cx="18" cy="92" rx="3"   ry="1.8" fill="#8a6018" opacity="0.55"/>
    <ellipse cx="36" cy="95" rx="2.5" ry="1.5" fill="#8a6018" opacity="0.45"/>
    <ellipse cx="55" cy="93" rx="3.5" ry="2"   fill="#8a6018" opacity="0.5"/>
    <ellipse cx="70" cy="96" rx="2.5" ry="1.5" fill="#8a6018" opacity="0.45"/>
    <ellipse cx="84" cy="91" rx="3"   ry="1.8" fill="#8a6018" opacity="0.55"/>
    <ellipse cx="28" cy="97" rx="2"   ry="1.2" fill="#8a6018" opacity="0.4"/>
    <ellipse cx="76" cy="94" rx="2"   ry="1.2" fill="#8a6018" opacity="0.4"/>

    <!-- Clay / reddish-brown layer -->
    <ellipse cx="50" cy="84" rx="52" ry="21" fill="url(#clayGrad)"/>

    <!-- Dark topsoil layer -->
    <ellipse cx="50" cy="76" rx="52" ry="20" fill="url(#darkGrad)"/>
    <!-- Soil texture dots -->
    <circle cx="20" cy="75" r="1.8" fill="#100806" opacity="0.38"/>
    <circle cx="36" cy="78" r="1.2" fill="#100806" opacity="0.32"/>
    <circle cx="56" cy="74" r="1.8" fill="#100806" opacity="0.38"/>
    <circle cx="74" cy="77" r="1.2" fill="#100806" opacity="0.32"/>
    <circle cx="88" cy="74" r="1.5" fill="#100806" opacity="0.35"/>
  </g>

  <!-- ── GRASS ── -->
  <g clip-path="url(#appShape)">
    <!-- Darkest back blades -->
    <g fill="#1b5e20">
      <path d="M 8 74 C  7 58  6 44 10 28 C 13 44 15 59 14 74 Z"/>
      <path d="M90 74 C 91 58 92 44 88 28 C 85 44 83 59 84 74 Z"/>
    </g>

    <!-- Dark green mid-back -->
    <g fill="#2e7d32">
      <path d="M13 73 C12 57 11 43 15 27 C18 43 20 58 19 73 Z"/>
      <path d="M85 73 C86 57 87 43 83 27 C80 43 78 58 79 73 Z"/>
      <path d="M21 71 C20 55 19 41 23 25 C26 41 28 56 27 71 Z"/>
      <path d="M77 71 C78 55 79 41 75 25 C72 41 70 56 71 71 Z"/>
    </g>

    <!-- Main green -->
    <g fill="#388e3c">
      <path d="M17 72 C16 56 15 42 19 26 C22 42 24 57 23 72 Z"/>
      <path d="M81 72 C82 56 83 42 79 26 C76 42 74 57 75 72 Z"/>
      <path d="M27 70 C26 54 25 40 29 24 C32 40 34 55 33 70 Z"/>
      <path d="M71 70 C72 54 73 40 69 24 C66 40 64 55 65 70 Z"/>
      <path d="M34 69 C33 53 32 39 36 23 C39 39 41 54 40 69 Z"/>
      <path d="M64 69 C65 53 66 39 62 23 C59 39 57 54 58 69 Z"/>
    </g>

    <!-- Bright green front blades -->
    <g fill="#4caf50">
      <path d="M22 71 C21 55 20 41 24 25 C27 41 29 56 28 71 Z"/>
      <path d="M76 71 C77 55 78 41 74 25 C71 41 69 56 70 71 Z"/>
      <path d="M30 70 C29 54 28 40 32 24 C35 40 37 55 36 70 Z"/>
      <path d="M68 70 C69 54 70 40 66 24 C63 40 61 55 62 70 Z"/>
      <path d="M38 69 C37 53 36 39 40 23 C43 39 45 54 44 69 Z"/>
      <path d="M60 69 C61 53 62 39 58 23 C55 39 53 54 54 69 Z"/>
      <path d="M46 68 C45 52 44 38 48 22 C51 38 53 53 52 68 Z"/>
    </g>

    <!-- Lightest / yellow-green tips -->
    <g fill="#66bb6a">
      <path d="M25 71 C24 56 23 43 27 28 C29 43 31 57 30 71 Z"/>
      <path d="M73 71 C74 56 75 43 71 28 C68 43 66 57 67 71 Z"/>
      <path d="M42 68 C41 53 40 40 44 25 C46 40 48 54 47 68 Z"/>
      <path d="M56 68 C57 53 58 40 54 25 C51 40 49 54 50 68 Z"/>
    </g>
  </g>

  <!-- ── SPEEDOMETER GAUGE ──
       Center: (50, 51), gauge radius: 20, arc radius: 14
       Arc from 7 o'clock (α=210°) to 5 o'clock (α=150°), clockwise (300° sweep)

       Point formula: x = 50 + 14·sin(α),  y = 51 − 14·cos(α)
         α=210° → (43,   63.1)   7 o'clock
         α=310° → (39.3, 42.0)  ~10:20 o'clock
         α= 50° → (60.7, 42.0)  ~1:40 o'clock
         α=150° → (57,   63.1)   5 o'clock
  -->

  <!-- Drop shadow -->
  <circle cx="50" cy="53" r="21" fill="#000" opacity="0.13"/>
  <!-- Gauge face -->
  <circle cx="50" cy="51" r="20" fill="url(#gaugeGrad)"/>
  <circle cx="50" cy="51" r="20" fill="none" stroke="#b8c4cc" stroke-width="0.8"/>

  <!-- Full arc track (background, gray) — 300° CW sweep=1 large-arc=1 -->
  <path d="M 43 63.1 A 14 14 0 1 1 57 63.1"
        fill="none" stroke="#d4dbe2" stroke-width="3.8" stroke-linecap="round"/>

  <!-- Green zone: α 210°→310° (100° CW, through left / 9 o'clock) -->
  <path d="M 43 63.1 A 14 14 0 0 1 39.3 42"
        fill="none" stroke="#66bb6a" stroke-width="3.8" stroke-linecap="round"/>

  <!-- Yellow zone: α 310°→50° (100° CW, through top / 12 o'clock) -->
  <path d="M 39.3 42 A 14 14 0 0 1 60.7 42"
        fill="none" stroke="#fdd835" stroke-width="3.8" stroke-linecap="round"/>

  <!-- Red zone: α 50°→150° (100° CW, through right / 3 o'clock) -->
  <path d="M 60.7 42 A 14 14 0 0 1 57 63.1"
        fill="none" stroke="#ef5350" stroke-width="3.8" stroke-linecap="round"/>

  <!-- Tick marks at zone edges -->
  <line x1="42.3" y1="64.5" x2="43.8" y2="62.6" stroke="#8a9aaa" stroke-width="1" stroke-linecap="round"/>
  <line x1="38.3" y1="41.1" x2="40.4" y2="43.1" stroke="#8a9aaa" stroke-width="1" stroke-linecap="round"/>
  <line x1="50"   y1="35.5" x2="50"   y2="37.5"  stroke="#8a9aaa" stroke-width="1" stroke-linecap="round"/>
  <line x1="61.7" y1="41.1" x2="59.6" y2="43.1"  stroke="#8a9aaa" stroke-width="1" stroke-linecap="round"/>
  <line x1="57.7" y1="64.5" x2="56.2" y2="62.6"  stroke="#8a9aaa" stroke-width="1" stroke-linecap="round"/>

  <!-- Needle — pointing ~1 o'clock (α=25°): tip at (54.6, 41.0) -->
  <line x1="50" y1="51" x2="54.6" y2="41.0"
        stroke="#455a64" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Centre hub -->
  <circle cx="50" cy="51" r="3"   fill="#546e7a"/>
  <circle cx="50" cy="51" r="1.3" fill="#eceff1"/>
</svg>
