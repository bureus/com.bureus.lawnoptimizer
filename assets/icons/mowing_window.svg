<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Calendar body -->
  <rect x="10" y="22" width="80" height="68" rx="8" fill="none" stroke="#4CAF50" stroke-width="5"/>
  <!-- Green header bar -->
  <rect x="10" y="22" width="80" height="20" rx="8" fill="#4CAF50"/>
  <rect x="10" y="34" width="80" height="8" fill="#4CAF50"/>
  <!-- Binding rings -->
  <rect x="28" y="12" width="7" height="18" rx="3.5" fill="#2E7D32"/>
  <rect x="65" y="12" width="7" height="18" rx="3.5" fill="#2E7D32"/>
  <!-- Grass blades above cut line inside calendar -->
  <path d="M22 62 Q20 54 18 50" stroke="#388E3C" stroke-width="4" stroke-linecap="round" fill="none"/>
  <path d="M32 62 Q32 52 30 48" stroke="#43A047" stroke-width="4" stroke-linecap="round" fill="none"/>
  <path d="M42 62 Q42 52 42 46" stroke="#2E7D32" stroke-width="4" stroke-linecap="round" fill="none"/>
  <path d="M52 62 Q52 52 52 46" stroke="#4CAF50" stroke-width="4" stroke-linecap="round" fill="none"/>
  <path d="M62 62 Q62 52 64 48" stroke="#388E3C" stroke-width="4" stroke-linecap="round" fill="none"/>
  <path d="M72 62 Q72 54 74 50" stroke="#43A047" stroke-width="4" stroke-linecap="round" fill="none"/>
  <path d="M82 62 Q84 54 86 50" stroke="#2E7D32" stroke-width="4" stroke-linecap="round" fill="none"/>
  <!-- Mowing cut line (yellow blade) -->
  <line x1="14" y1="62" x2="86" y2="62" stroke="#F9A825" stroke-width="4" stroke-linecap="round"/>
  <!-- Short stubble below cut line -->
  <line x1="22" y1="62" x2="22" y2="72" stroke="#81C784" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="34" y1="62" x2="34" y2="72" stroke="#81C784" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="46" y1="62" x2="46" y2="72" stroke="#81C784" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="58" y1="62" x2="58" y2="72" stroke="#81C784" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="70" y1="62" x2="70" y2="72" stroke="#81C784" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="82" y1="62" x2="82" y2="72" stroke="#81C784" stroke-width="3.5" stroke-linecap="round"/>
</svg>
