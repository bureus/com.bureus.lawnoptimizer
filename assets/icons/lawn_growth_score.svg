<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Gauge track (semi-circle) -->
  <path d="M16 72 A38 38 0 0 1 84 72" stroke="#C8E6C9" stroke-width="9" stroke-linecap="round" fill="none"/>
  <!-- Gauge fill — roughly 70 % (good growth) -->
  <path d="M16 72 A38 38 0 0 1 72 34" stroke="#4CAF50" stroke-width="9" stroke-linecap="round" fill="none"/>
  <!-- Needle -->
  <line x1="50" y1="72" x2="70" y2="36" stroke="#2E7D32" stroke-width="5" stroke-linecap="round"/>
  <!-- Pivot circle -->
  <circle cx="50" cy="72" r="6" fill="#2E7D32"/>
  <circle cx="50" cy="72" r="3" fill="#fff"/>
  <!-- Grass blades above pivot -->
  <path d="M50 66 Q47 56 44 50" stroke="#4CAF50" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <path d="M50 66 Q50 54 50 46" stroke="#66BB6A" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <path d="M50 66 Q53 56 56 50" stroke="#4CAF50" stroke-width="3.5" stroke-linecap="round" fill="none"/>
</svg>
